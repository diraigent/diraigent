title: Standard Lifecycle
trigger_description: "implement \u2192 review"
initial_state: ready
tags: [default]
metadata:
  git_strategy: merge_to_default

steps:
  - name: implement
    budget: 12.0
    allowed_tools: full
    context_level: full
    on_complete: next
    description: |
      ## Your Job: IMPLEMENT

      1. **Read the task**: Run `{{agent_cli}} task {{task_id}}` to get the spec, files, test_cmd, and acceptance criteria. Also check `## Task Discussion` above for any human instructions.
      2. **Claim the task**: Run `{{agent_cli}} claim {{task_id}}`
      3. **Assess complexity**: If this touches many files across modules, decompose:
         - Create subtasks: `{{agent_cli}} create {{project_id}} '<json>'`
         - Wire dependencies: `{{agent_cli}} depend <id> <dep_id>`
         - Transition subtasks to ready: `{{agent_cli}} transition <id> ready`
         - Post progress and submit for review. Stop here.
         Otherwise, continue.
      4. **Implement**: Write code as the spec requires.
      5. **Report progress**: `{{agent_cli}} progress {{task_id}} "what was done"`
      6. **Lint & format**: If a lint command is available, run it. Fix all issues before testing.
      7. **Test**: If a test command is specified, run it. Retry up to 3 times on failure.
         - Still failing? `{{agent_cli}} blocker {{task_id}} "error"`, `{{agent_cli}} transition {{task_id}} ready`
      8. **Post artifacts**: `{{agent_cli}} artifact {{task_id}} "test output"`
      9. **Complete**: `{{agent_cli}} transition {{task_id}} done`
      10. **File observations** for code smells, risks, or improvements:
          `{{agent_cli}} observation {{project_id}} '{"kind":"<insight|risk|smell|improvement>","title":"...","description":"...","severity":"<info|low|medium|high>"}'`

      **Rules**: Do NOT run `git push`. Stay in your worktree.

      **Scope guardrail**: Before transitioning to done, run `git diff --stat {{project.default_branch}}...HEAD` and verify you only touched files listed in the task spec.

  - name: review
    budget: 5.0
    model: claude-sonnet-4-6
    allowed_tools: readonly
    context_level: minimal
    on_complete: next
    description: |
      ## Your Job: CODE REVIEW

      1. **Read the task**: Run `{{agent_cli}} task {{task_id}}` to get the spec and acceptance criteria.
      2. **Claim the task**: Run `{{agent_cli}} claim {{task_id}}`
      3. **Review the changes**: Run `git diff {{project.default_branch}}...HEAD` to see what changed.
      4. **Check quality**: Does it meet the spec? Acceptance criteria met? Any obvious bugs or security issues?
      5. **Post your review**: `{{agent_cli}} artifact {{task_id}} "REVIEW: <findings>"`
      6. **Decision**:
         - APPROVED: `{{agent_cli}} transition {{task_id}} done`
         - CHANGES NEEDED: `{{agent_cli}} blocker {{task_id}} "what needs fixing"`, then `{{agent_cli}} transition {{task_id}} ready`

      **Rules**: Do NOT modify code -- only review. Be specific (file names, line numbers).
