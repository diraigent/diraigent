name: Release Diraigent Binaries

on:
  push:
    tags:
      - 'v[0-9]*'

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: orchestra-linux-amd64
            binary: orchestra
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: orchestra-linux-arm64
            binary: orchestra
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: orchestra-macos-arm64
            binary: orchestra
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p diraigent-orchestra --bin orchestra

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/orchestra-linux-amd64/orchestra release/orchestra-linux-amd64
          cp artifacts/orchestra-linux-arm64/orchestra release/orchestra-linux-arm64
          cp artifacts/orchestra-macos-arm64/orchestra release/orchestra-macos-arm64
          cd release
          sha256sum orchestra-* > checksums.txt

      - name: GPG sign checksums
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --armor --detach-sign release/checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/orchestra-linux-amd64
            release/orchestra-linux-arm64
            release/orchestra-macos-arm64
            release/checksums.txt
            release/checksums.txt.asc
