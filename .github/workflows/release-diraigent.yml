name: Release Diraigent Binaries

on:
  push:
    tags:
      - 'v[0-9]*'

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # ── Orchestra ──
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: orchestra-linux-amd64
            binary: orchestra
            package: diraigent-orchestra
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: orchestra-linux-arm64
            binary: orchestra
            package: diraigent-orchestra
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: orchestra-macos-arm64
            binary: orchestra
            package: diraigent-orchestra
          # ── API ──
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: api-linux-amd64
            binary: diraigent-api
            package: diraigent-api
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: api-linux-arm64
            binary: diraigent-api
            package: diraigent-api
            cross: true
          # ── TUI ──
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: tui-linux-amd64
            binary: diraigent-tui
            package: diraigent-tui
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: tui-linux-arm64
            binary: diraigent-tui
            package: diraigent-tui
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: tui-macos-arm64
            binary: diraigent-tui
            package: diraigent-tui
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.package }} --bin ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/orchestra-linux-amd64/orchestra release/orchestra-linux-amd64
          cp artifacts/orchestra-linux-arm64/orchestra release/orchestra-linux-arm64
          cp artifacts/orchestra-macos-arm64/orchestra release/orchestra-macos-arm64
          cp artifacts/api-linux-amd64/diraigent-api release/api-linux-amd64
          cp artifacts/api-linux-arm64/diraigent-api release/api-linux-arm64
          cp artifacts/tui-linux-amd64/diraigent-tui release/tui-linux-amd64
          cp artifacts/tui-linux-arm64/diraigent-tui release/tui-linux-arm64
          cp artifacts/tui-macos-arm64/diraigent-tui release/tui-macos-arm64
          cd release
          sha256sum * > checksums.txt

      - name: GPG sign checksums
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          gpg --batch --pinentry-mode loopback \
            --armor --detach-sign release/checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/orchestra-linux-amd64
            release/orchestra-linux-arm64
            release/orchestra-macos-arm64
            release/api-linux-amd64
            release/api-linux-arm64
            release/tui-linux-amd64
            release/tui-linux-arm64
            release/tui-macos-arm64
            release/checksums.txt
            release/checksums.txt.asc
