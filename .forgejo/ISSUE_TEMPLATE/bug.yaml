name: Bug Report
about: Something isn't working as expected
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Web (Angular)
        - API (Ktor)
        - Zuuid / Scraper
        - Profile
        - Health
        - News
        - Tags
        - Auth (Authentik)
        - iOS
        - Android
        - Other
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low — cosmetic / minor
        - Medium — broken feature, workaround exists
        - High — broken feature, no workaround
        - Critical — data loss / security
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, browser/device info, etc.
