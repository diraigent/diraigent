name: Feature Request
about: Suggest a new feature or enhancement
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What do you want to add or change?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks / Acceptance criteria
      description: Break it down if possible.
      placeholder: |
        - [ ] Task 1
        - [ ] Task 2
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Web (Angular)
        - API (Ktor)
        - Zuuid / Scraper
        - Profile
        - Health
        - News
        - Tags
        - Auth (Authentik)
        - iOS
        - Android
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, related issues, etc.
