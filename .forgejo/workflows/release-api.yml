name: Release API

on:
  push:
    tags:
      - 'v[0-9]*'

concurrency:
  group: release-api
  cancel-in-progress: false

jobs:
  check:
    name: Check for changes
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes since last tag
        id: diff
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v[0-9]' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$PREV_TAG"..HEAD -- apps/api/ libs/common-rust/ Cargo.toml Cargo.lock | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # Promote: re-tag the existing amd64 image from deploy (no rebuild)
  promote-amd64:
    name: API (promote amd64)
    needs: [check]
    if: needs.check.outputs.changed == 'true'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Re-tag existing amd64 image
        run: |
          VERSION="${GITHUB_REF_NAME}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"
          # Pull the amd64 image that deploy already built
          docker pull "${FORGEJO}:latest"
          # Re-tag for release
          docker tag "${FORGEJO}:latest" "diraigent/api:${VERSION}-amd64"
          docker tag "${FORGEJO}:latest" "${FORGEJO}:${VERSION}-amd64"
          docker push "diraigent/api:${VERSION}-amd64"
          docker push "${FORGEJO}:${VERSION}-amd64"

  # Build: only arm64 needs a fresh build
  build-arm64:
    name: API (build arm64)
    needs: [check]
    if: needs.check.outputs.changed == 'true'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Create buildx builder
        run: docker buildx create --name builder --driver docker-container --use && docker buildx inspect --bootstrap
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Build and push
        run: |
          VERSION="${GITHUB_REF_NAME}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"
          docker buildx build \
            --platform linux/arm64 \
            --build-arg DIRAIGENT_VERSION="${VERSION}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -f apps/api/Containerfile \
            -t "diraigent/api:${VERSION}-arm64" \
            -t "${FORGEJO}:${VERSION}-arm64" \
            --push .

  manifest:
    name: API (manifest)
    needs: [promote-amd64, build-arm64]
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Create and push manifests
        run: |
          VERSION="${GITHUB_REF_NAME}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"

          # Docker Hub
          docker buildx imagetools create \
            -t "diraigent/api:${VERSION}" \
            -t "diraigent/api:latest" \
            "diraigent/api:${VERSION}-amd64" \
            "diraigent/api:${VERSION}-arm64"

          # Forgejo
          docker buildx imagetools create \
            -t "${FORGEJO}:${VERSION}" \
            -t "${FORGEJO}:latest" \
            "${FORGEJO}:${VERSION}-amd64" \
            "${FORGEJO}:${VERSION}-arm64"
