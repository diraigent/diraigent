name: Security Dependency Scan

on:
  schedule:
    - cron: '0 4 * * 1,3,6'   # Mon, Wed, Sat at 4:00 UTC
  workflow_dispatch:

jobs:
  npm-audit:
    name: NPM Audit (Web)
    runs-on: docker
    container: node:25.6.1-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci --prefix apps/web

      - name: Run npm audit
        run: npm audit --prefix apps/web --audit-level=high

  cargo-audit:
    name: Cargo Audit (Rust)
    runs-on: docker
    container: rust:1.93-bookworm
    steps:
      - name: Install Node.js (required by JS-based actions)
        run: |
          curl -fsSL https://nodejs.org/dist/v25.6.1/node-v25.6.1-linux-x64.tar.xz \
            | tar xJ -C /usr/local --strip-components=1

      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  trivy-scan:
    name: Trivy Filesystem Scan
    runs-on: docker
    container: node:25.6.1-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          apt-get update && apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy vulnerability scanner
        run: trivy fs --severity HIGH,CRITICAL .

  secrets-scan:
    name: TruffleHog Secrets Scan
    runs-on: docker
    container: node:25.6.1-bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: |
          apt-get update && apt-get install -y curl
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run TruffleHog scan
        run: trufflehog filesystem --only-verified .
