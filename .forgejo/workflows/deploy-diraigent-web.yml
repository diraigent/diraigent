name: deploy-diraigent-web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.forgejo/workflows/deploy-diraigent-web.yml'

concurrency:
  group: deploy-diraigent-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Push
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Forgejo Container Registry
        run: docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          COMMIT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          IMAGE="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/web"
          docker build \
            -f apps/web/Containerfile \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:main-${TIMESTAMP}-${COMMIT_SHA}" \
            apps/web/
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:main-${TIMESTAMP}-${COMMIT_SHA}"
