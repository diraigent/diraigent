name: Test Diraigent

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'apps/**'
      - 'libs/common-rust/**'
      - '.forgejo/workflows/test-diraigent.yml'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: test-diraigent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Rust — lint & test (single compile, shared build artifacts)
  # ──────────────────────────────────────────────────────────────────
  rust:
    name: Rust Lint & Test
    runs-on: docker
    container: rust:1.93-bookworm
    env:
      SQLX_OFFLINE: "true"
    steps:
      - name: Install Node.js (required by JS-based actions)
        run: |
          curl -fsSL https://nodejs.org/dist/v25.6.1/node-v25.6.1-linux-x64.tar.xz \
            | tar xJ -C /usr/local --strip-components=1

      - uses: actions/checkout@v4

      - name: Install protoc
        run: apt-get update && apt-get install -y protobuf-compiler

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-test-

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude diraigent-desktop -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude diraigent-desktop --verbose

  # ──────────────────────────────────────────────────────────────────
  # Web — lint & build (single npm ci)
  # ──────────────────────────────────────────────────────────────────
  web:
    name: Web Lint & Build
    runs-on: docker
    container: node:25.6.1-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci --prefix apps/web

      - name: Lint
        run: npm run lint --prefix apps/web

      - name: Build
        run: npm run build:prod --prefix apps/web
