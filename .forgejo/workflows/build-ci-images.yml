name: Build CI Images

on:
  push:
    branches: ['**']
    paths:
      - '.forgejo/images/**'
      - '.forgejo/workflows/build-ci-images.yml'
  workflow_dispatch:

concurrency:
  group: build-ci-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-deploy:
    name: ci-deploy
    runs-on: docker
    container: node:22-slim
    steps:
      - name: Install prerequisites
        run: |
          apt-get update && apt-get install -y --no-install-recommends ca-certificates curl gnupg
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable" \
            > /etc/apt/sources.list.d/docker.list
          apt-get update && apt-get install -y --no-install-recommends docker-ce-cli docker-buildx-plugin

      - uses: actions/checkout@v4

      - name: Login to Forgejo Container Registry
        run: docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          IMAGE="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy"
          docker build -f .forgejo/images/ci-deploy.Containerfile \
            -t "${IMAGE}:latest" .forgejo/images/
          docker push "${IMAGE}:latest"
