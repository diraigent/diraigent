name: Release Diraigent

on:
  push:
    tags:
      - 'v[0-9]*'

concurrency:
  group: release-diraigent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────
  # API
  # ──────────────────────────────────────────────────────────────────
  api:
    name: API
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Create buildx builder
        run: |
          docker buildx create --name builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Login to Forgejo Container Registry
        run: docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CACHE_REF="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api:buildcache"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --cache-from "type=registry,ref=${CACHE_REF}-amd64" \
            --cache-from "type=registry,ref=${CACHE_REF}-arm64" \
            --cache-to "type=inline" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -f apps/api/Containerfile \
            -t "diraigent/api:${VERSION}" \
            -t "diraigent/api:latest" \
            -t "${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api:${VERSION}" \
            -t "${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api:latest" \
            --push .

  # ──────────────────────────────────────────────────────────────────
  # Orchestra
  # ──────────────────────────────────────────────────────────────────
  orchestra:
    name: Orchestra
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Create buildx builder
        run: |
          docker buildx create --name builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Login to Forgejo Container Registry
        run: docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CACHE_REF="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/orchestra:buildcache"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --cache-from "type=registry,ref=${CACHE_REF}-amd64" \
            --cache-from "type=registry,ref=${CACHE_REF}-arm64" \
            --cache-to "type=inline" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -f apps/orchestra/Containerfile \
            -t "diraigent/orchestra:${VERSION}" \
            -t "diraigent/orchestra:latest" \
            -t "${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/orchestra:${VERSION}" \
            -t "${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/orchestra:latest" \
            --push .

  # ──────────────────────────────────────────────────────────────────
  # Web
  # ──────────────────────────────────────────────────────────────────
  web:
    name: Web
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Create buildx builder
        run: |
          docker buildx create --name builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Login to Forgejo Container Registry
        run: docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CACHE_REF="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/web:buildcache"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --cache-from "type=registry,ref=${CACHE_REF}" \
            --cache-to "type=inline" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -f apps/web/Containerfile \
            -t "diraigent/web:${VERSION}" \
            -t "diraigent/web:latest" \
            -t "${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/web:${VERSION}" \
            -t "${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/web:latest" \
            --push apps/web/
