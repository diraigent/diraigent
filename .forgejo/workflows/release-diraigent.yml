name: Release Diraigent

on:
  push:
    tags:
      - 'v[0-9]*'

concurrency:
  group: release-diraigent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────
  # API — per-arch builds
  # ──────────────────────────────────────────────────────────────────
  api-amd64:
    name: API (amd64)
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Create buildx builder
        run: docker buildx create --name builder --driver docker-container --use && docker buildx inspect --bootstrap
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Build and push
        run: |
          VERSION="${GITHUB_REF_NAME}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"
          docker buildx build \
            --platform linux/amd64 \
            --cache-from "type=registry,ref=${FORGEJO}:buildcache-amd64" \
            --cache-to "type=registry,ref=${FORGEJO}:buildcache-amd64,mode=max" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -f apps/api/Containerfile \
            -t "diraigent/api:${VERSION}-amd64" \
            -t "${FORGEJO}:${VERSION}-amd64" \
            --push .

  api-arm64:
    name: API (arm64)
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Create buildx builder
        run: docker buildx create --name builder --driver docker-container --use && docker buildx inspect --bootstrap
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Build and push
        run: |
          VERSION="${GITHUB_REF_NAME}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"
          docker buildx build \
            --platform linux/arm64 \
            --cache-from "type=registry,ref=${FORGEJO}:buildcache-arm64" \
            --cache-to "type=registry,ref=${FORGEJO}:buildcache-arm64,mode=max" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -f apps/api/Containerfile \
            -t "diraigent/api:${VERSION}-arm64" \
            -t "${FORGEJO}:${VERSION}-arm64" \
            --push .

  api-manifest:
    name: API (manifest)
    needs: [api-amd64, api-arm64]
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Create and push manifests
        run: |
          VERSION="${GITHUB_REF_NAME}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"

          # Docker Hub
          docker buildx imagetools create \
            -t "diraigent/api:${VERSION}" \
            -t "diraigent/api:latest" \
            "diraigent/api:${VERSION}-amd64" \
            "diraigent/api:${VERSION}-arm64"

          # Forgejo
          docker buildx imagetools create \
            -t "${FORGEJO}:${VERSION}" \
            -t "${FORGEJO}:latest" \
            "${FORGEJO}:${VERSION}-amd64" \
            "${FORGEJO}:${VERSION}-arm64"

  # ──────────────────────────────────────────────────────────────────
  # Orchestra — per-arch builds
  # ──────────────────────────────────────────────────────────────────
