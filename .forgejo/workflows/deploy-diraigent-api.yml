name: deploy-diraigent-api

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'apps/api/**'
      - 'libs/common-rust/**'
      - '.forgejo/workflows/deploy-diraigent-api.yml'

concurrency:
  group: deploy-diraigent-api
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Push (amd64)
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}

      - name: Detect release tag
        id: tag
        run: |
          VERSION=$(git tag --points-at HEAD | grep '^v[0-9]' | head -1 || true)
          if [ -n "$VERSION" ]; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          COMMIT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          IMAGE="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"
          docker build \
            -f apps/api/Containerfile \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:main-${TIMESTAMP}-${COMMIT_SHA}" \
            .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:main-${TIMESTAMP}-${COMMIT_SHA}"

      - name: Push release amd64 tags
        if: steps.tag.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          IMAGE="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"
          docker tag "${IMAGE}:latest" "diraigent/api:${VERSION}-amd64"
          docker tag "${IMAGE}:latest" "${IMAGE}:${VERSION}-amd64"
          docker push "diraigent/api:${VERSION}-amd64"
          docker push "${IMAGE}:${VERSION}-amd64"

    outputs:
      is_release: ${{ steps.tag.outputs.is_release }}
      version: ${{ steps.tag.outputs.version }}

  build-arm64:
    name: Release (build arm64)
    needs: [deploy]
    if: needs.deploy.outputs.is_release == 'true'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Create buildx builder
        run: docker buildx create --name builder --driver docker-container --use && docker buildx inspect --bootstrap
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Build and push
        run: |
          VERSION="${{ needs.deploy.outputs.version }}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"
          docker buildx build \
            --platform linux/arm64 \
            --build-arg DIRAIGENT_VERSION="${VERSION}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -f apps/api/Containerfile \
            -t "diraigent/api:${VERSION}-arm64" \
            -t "${FORGEJO}:${VERSION}-arm64" \
            --push .

  manifest:
    name: Release (manifest)
    needs: [deploy, build-arm64]
    if: needs.deploy.outputs.is_release == 'true'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Create and push manifests
        run: |
          VERSION="${{ needs.deploy.outputs.version }}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"

          docker buildx imagetools create \
            -t "diraigent/api:${VERSION}" \
            -t "diraigent/api:latest" \
            "diraigent/api:${VERSION}-amd64" \
            "diraigent/api:${VERSION}-arm64"

          docker buildx imagetools create \
            -t "${FORGEJO}:${VERSION}" \
            -t "${FORGEJO}:latest" \
            "${FORGEJO}:${VERSION}-amd64" \
            "${FORGEJO}:${VERSION}-arm64"

  sign:
    name: Release (sign)
    needs: [deploy, manifest]
    if: needs.deploy.outputs.is_release == 'true'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/ci-deploy:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - name: Login to registries
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker login ${{ vars.REGISTRY_URL }} -u ${{ github.repository_owner }} -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Sign images with cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          printf '%s\n' "${{ secrets.COSIGN_KEY }}" > /tmp/cosign.key
          VERSION="${{ needs.deploy.outputs.version }}"
          FORGEJO="${{ vars.REGISTRY_URL }}/${{ github.repository_owner }}/diraigent/api"

          DIGEST="sha256:$(docker buildx imagetools inspect --raw "diraigent/api:${VERSION}" | sha256sum | awk '{print $1}')"
          cosign sign --key /tmp/cosign.key --yes "diraigent/api@${DIGEST}"

          DIGEST="sha256:$(docker buildx imagetools inspect --raw "${FORGEJO}:${VERSION}" | sha256sum | awk '{print $1}')"
          cosign sign --key /tmp/cosign.key --yes "${FORGEJO}@${DIGEST}"

          rm -f /tmp/cosign.key
