services:
  # ── Infrastructure ────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: diraigent
      POSTGRES_USER: diraigent
      POSTGRES_PASSWORD: diraigent
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diraigent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Diraigent ─────────────────────────────────────────────────────

  api:
    image: diraigent/api:latest
    networks:
      default:
        aliases:
          - diraigent-api
    ports:
      - "8082:8082"
    environment:
      HOST: 0.0.0.0
      PORT: 8082
      DATABASE_URL: postgres://diraigent:diraigent@postgres:5432/diraigent
      DEV_USER_ID: ${DEV_USER_ID:-}
      AUTH_ISSUER: ${AUTH_ISSUER:-}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      SERVICE_NAME: diraigent-api
      LOKI_URL: ${LOKI_URL:-}
      LOKI_ENV: ${LOKI_ENV:-dev}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      PROJECTS_PATH: /projects
    volumes:
      - projects:/projects
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    image: diraigent/web:latest
    ports:
      - "4200:80"
    environment:
      API_SERVER: ${API_SERVER:-http://localhost:8082/v1}
      AUTH_PROVIDER_BASE: ${AUTH_PROVIDER_BASE:-}
      AUTH_ISSUER: ${AUTH_ISSUER:-}
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID:-}
    depends_on:
      api:
        condition: service_healthy

  orchestra:
    image: diraigent/orchestra:latest
    environment:
      AGENT_ID: ${AGENT_ID:-}
      DIRAIGENT_API_URL: http://api:8082/v1
      DIRAIGENT_API_TOKEN: ${DIRAIGENT_API_TOKEN:-}
      DIRAIGENT_DEV_USER_ID: ${DEV_USER_ID:-}
      MAX_WORKERS: ${MAX_WORKERS:-3}
      PROJECTS_PATH: /projects
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - projects:/projects
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  projects:
